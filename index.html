<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>내 포트폴리오</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:#070e1c;overflow-x:hidden;font-family:'Noto Sans KR',sans-serif;}
button{touch-action:manipulation;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
input,select{-webkit-appearance:none;appearance:none;font-size:16px!important;font-family:'Noto Sans KR',sans-serif;}
input:focus,select:focus{border-color:#60a5fa!important;outline:none;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}
#root{max-width:480px;margin:0 auto;}
/* 모달: body overflow 건드리지 않음 (키보드 버그 방지) */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:#0d1a2a;border-radius:22px 22px 0 0;width:100%;max-width:480px;border:1px solid #1e3250;max-height:88svh;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 18px 48px;will-change:transform;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>

<!-- 잠금화면 -->
<div id="lockScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#0c2040 0%,#070e1c 100%);padding:32px 24px;max-width:480px;margin:0 auto;">
  <div style="text-align:center;margin-bottom:44px;">
    <div style="font-size:52px;margin-bottom:16px;">🔐</div>
    <div style="font-size:10px;color:#527a96;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;">MY PORTFOLIO</div>
    <div style="font-size:22px;font-weight:800;color:#f0f4f8;">잠금 해제</div>
    <div id="lockMsg" style="font-size:13px;color:#527a96;margin-top:8px;min-height:20px;transition:color .2s;">비밀번호 입력 또는 지문 인증</div>
  </div>
  <button id="bioBtn" onclick="tryBiometric()" style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#1a3050,#0e1c2e);border:2px solid #1e3250;color:#60a5fa;font-size:36px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px #60a5fa22;transition:transform .1s,border-color .3s;" ontouchstart="this.style.transform='scale(0.92)'" ontouchend="this.style.transform='scale(1)'">👆</button>
  <div id="bioLabel" style="font-size:12px;color:#527a96;margin-bottom:32px;">지문 인식</div>
  <div style="display:flex;align-items:center;gap:12px;width:100%;max-width:320px;margin-bottom:28px;">
    <div style="flex:1;height:1px;background:#1e3250;"></div><div style="font-size:12px;color:#527a96;">또는</div><div style="flex:1;height:1px;background:#1e3250;"></div>
  </div>
  <div style="width:100%;max-width:320px;">
    <div style="position:relative;margin-bottom:12px;">
      <input id="pwInput" type="password" autocomplete="current-password" placeholder="비밀번호 입력" maxlength="20"
        style="width:100%;padding:16px 52px 16px 18px;background:#0e1c2e;border:1.5px solid #1e3250;border-radius:14px;color:#f0f4f8;font-size:16px;outline:none;box-sizing:border-box;transition:border-color .2s;"
        onkeydown="if(event.key==='Enter'){event.preventDefault();tryPassword();}" oninput="clearMsg();"/>
      <button onclick="togglePw()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#527a96;font-size:18px;cursor:pointer;padding:8px;min-width:40px;min-height:40px;line-height:1;">👁</button>
    </div>
    <button onclick="tryPassword()" style="width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;min-height:52px;">잠금 해제</button>
  </div>
  <button onclick="showChangePw()" style="margin-top:28px;background:none;border:none;color:#3a5470;font-size:12px;cursor:pointer;text-decoration:underline;padding:10px;">비밀번호 변경</button>
  <!-- 비밀번호 변경 패널 -->
  <div id="changePwPanel" style="display:none;width:100%;max-width:320px;margin-top:16px;background:#0e1c2e;border:1px solid #1e3250;border-radius:16px;padding:20px;animation:fadeIn .2s ease;">
    <div style="font-size:14px;color:#90b0cc;font-weight:700;margin-bottom:16px;">🔑 비밀번호 변경</div>
    <div style="margin-bottom:10px;"><div style="font-size:11px;color:#527a96;margin-bottom:5px;font-weight:600;">현재 비밀번호</div>
      <input id="oldPw" type="password" autocomplete="current-password" placeholder="현재 비밀번호 입력" maxlength="20"
        style="width:100%;padding:13px 16px;background:#111f33;border:1.5px solid #1e3250;border-radius:10px;color:#f0f4f8;font-size:16px;outline:none;box-sizing:border-box;display:block;" oninput="clearMsg();"/></div>
    <div style="margin-bottom:10px;"><div style="font-size:11px;color:#527a96;margin-bottom:5px;font-weight:600;">새 비밀번호 (4자 이상)</div>
      <input id="newPw1" type="password" autocomplete="new-password" placeholder="새 비밀번호" maxlength="20"
        style="width:100%;padding:13px 16px;background:#111f33;border:1.5px solid #1e3250;border-radius:10px;color:#f0f4f8;font-size:16px;outline:none;box-sizing:border-box;display:block;" oninput="clearMsg();"/></div>
    <div style="margin-bottom:16px;"><div style="font-size:11px;color:#527a96;margin-bottom:5px;font-weight:600;">새 비밀번호 확인</div>
      <input id="newPw2" type="password" autocomplete="new-password" placeholder="새 비밀번호 재입력" maxlength="20"
        style="width:100%;padding:13px 16px;background:#111f33;border:1.5px solid #1e3250;border-radius:10px;color:#f0f4f8;font-size:16px;outline:none;box-sizing:border-box;display:block;"
        onkeydown="if(event.key==='Enter'){event.preventDefault();doChangePw();}" oninput="clearMsg();"/></div>
    <div style="display:flex;gap:10px;">
      <button onclick="cancelChangePw()" style="flex:1;min-height:46px;background:#111f33;border:1px solid #1e3250;border-radius:10px;color:#527a96;font-size:13px;font-weight:700;">취소</button>
      <button onclick="doChangePw()" style="flex:1;min-height:46px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;">저장</button>
    </div>
  </div>
</div>

<div id="root" style="display:none;"></div>

<script>
const LOCK_KEY="pf_lock_pw",DEFAULT_PW="1234";
let bioCredId=localStorage.getItem("pf_bio_cred")||null;
const getSavedPw=()=>localStorage.getItem(LOCK_KEY)||DEFAULT_PW;
function unlock(){document.getElementById("lockScreen").style.display="none";document.getElementById("root").style.display="block";}
function setMsg(msg,isErr){const el=document.getElementById("lockMsg");el.textContent=msg;el.style.color=isErr?"#e03131":"#34d399";}
function clearMsg(){const el=document.getElementById("lockMsg");el.textContent="비밀번호 입력 또는 지문 인증";el.style.color="#527a96";}
function tryPassword(){
  const v=document.getElementById("pwInput").value;
  if(!v){setMsg("비밀번호를 입력해주세요.",true);return;}
  if(v===getSavedPw()){setMsg("✅ 인증 성공!",false);setTimeout(unlock,350);}
  else{
    setMsg("❌ 비밀번호가 틀렸어요.",true);
    document.getElementById("pwInput").value="";
    const inp=document.getElementById("pwInput");
    inp.style.borderColor="#e03131";inp.style.animation="shake .35s ease";
    setTimeout(()=>{inp.style.borderColor="#1e3250";inp.style.animation="";inp.focus();},400);
  }
}
function togglePw(){const i=document.getElementById("pwInput");i.type=i.type==="password"?"text":"password";}
async function tryBiometric(){document.getElementById("bioBtn").textContent="⏳";if(bioCredId){await authBio();}else{await enrollBio();}}
async function enrollBio(){
  if(!window.PublicKeyCredential){setMsg("지문 미지원 기기입니다.",true);resetBioBtn();return;}
  try{
    setMsg("지문을 올려주세요...",false);
    const ch=new Uint8Array(32);crypto.getRandomValues(ch);
    const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"내포트폴리오",id:location.hostname||"localhost"},user:{id:new Uint8Array([1]),name:"user",displayName:"사용자"},pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",requireResidentKey:false},timeout:30000}});
    const id=btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    localStorage.setItem("pf_bio_cred",id);bioCredId=id;
    document.getElementById("bioLabel").textContent="지문 인식 (등록됨)";
    document.getElementById("bioBtn").style.borderColor="#34d399";
    setMsg("✅ 지문 등록 완료!",false);setTimeout(unlock,500);
  }catch(e){setMsg(e.name==="NotAllowedError"?"지문 인식이 취소됐어요.":"지문 등록 실패. 기기 설정을 확인하세요.",true);resetBioBtn();}
}
async function authBio(){
  if(!window.PublicKeyCredential){setMsg("지문 미지원 기기입니다.",true);resetBioBtn();return;}
  try{
    setMsg("지문을 인식합니다...",false);
    const ch=new Uint8Array(32);crypto.getRandomValues(ch);
    const bin=atob(bioCredId);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    await navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:[{type:"public-key",id:arr.buffer}],userVerification:"required",timeout:30000}});
    setMsg("✅ 지문 인증 성공!",false);setTimeout(unlock,350);
  }catch(e){
    if(e.name==="InvalidStateError"){localStorage.removeItem("pf_bio_cred");bioCredId=null;setMsg("지문 정보가 초기화됐어요. 다시 등록해주세요.",true);}
    else{setMsg(e.name==="NotAllowedError"?"지문 인식이 취소됐어요.":"지문 인식 실패. 비밀번호를 사용해주세요.",true);}
    resetBioBtn();
  }
}
function resetBioBtn(){document.getElementById("bioBtn").textContent="👆";}
function showChangePw(){document.getElementById("changePwPanel").style.display="block";setTimeout(()=>document.getElementById("oldPw").focus(),100);}
function cancelChangePw(){document.getElementById("changePwPanel").style.display="none";["oldPw","newPw1","newPw2"].forEach(id=>document.getElementById(id).value="");clearMsg();}
function doChangePw(){
  const old=document.getElementById("oldPw").value,p1=document.getElementById("newPw1").value,p2=document.getElementById("newPw2").value;
  if(!old){setMsg("현재 비밀번호를 입력해주세요.",true);document.getElementById("oldPw").focus();return;}
  if(old!==getSavedPw()){setMsg("❌ 현재 비밀번호가 틀렸어요.",true);document.getElementById("oldPw").value="";document.getElementById("oldPw").focus();return;}
  if(!p1||p1.length<4){setMsg("새 비밀번호는 4자 이상이어야 해요.",true);document.getElementById("newPw1").focus();return;}
  if(p1!==p2){setMsg("새 비밀번호가 일치하지 않아요.",true);document.getElementById("newPw2").value="";document.getElementById("newPw2").focus();return;}
  if(p1===old){setMsg("현재 비밀번호와 같아요. 다른 비밀번호를 입력해주세요.",true);return;}
  localStorage.setItem(LOCK_KEY,p1);cancelChangePw();setMsg("✅ 비밀번호가 변경됐어요!",false);
}
(async()=>{
  if(!localStorage.getItem(LOCK_KEY))setMsg("초기 비밀번호: 1234 (변경을 권장해요)",false);
  if(!window.PublicKeyCredential){document.getElementById("bioBtn").style.opacity="0.35";document.getElementById("bioLabel").textContent="지문 미지원";return;}
  const ok=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!ok){document.getElementById("bioBtn").style.opacity="0.35";document.getElementById("bioLabel").textContent="지문 센서 없음";}
  else if(bioCredId){document.getElementById("bioLabel").textContent="지문 인식 (등록됨)";document.getElementById("bioBtn").style.borderColor="#34d399";document.getElementById("bioBtn").style.boxShadow="0 4px 24px #34d39933";}
})();
</script>

<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef,memo}=React;

/* ─── 상수 ─── */
const ACCOUNTS=[
  {id:"amt",    label:"AMT 계좌", short:"AMT",  shared:true, color:"#f59e0b",icon:"🤝",types:["국내ETF","미국주식","미국ETF"]},
  {id:"myamt",  label:"My AMT",   short:"MyAMT",shared:false,color:"#60a5fa",icon:"💎",types:["국내ETF","미국주식","미국ETF"]},
  {id:"general",label:"일반계좌", short:"일반", shared:false,color:"#34d399",icon:"📂",types:["미국주식","미국ETF"]},
  {id:"pension",label:"퇴직연금", short:"퇴직", shared:false,color:"#a78bfa",icon:"🏦",types:["국내ETF","펀드","적금"],directInput:true},
  {id:"irp",    label:"IRP",      short:"IRP",  shared:false,color:"#fb923c",icon:"🔒",types:["국내ETF","펀드"]},
  {id:"isa",    label:"ISA",      short:"ISA",  shared:false,color:"#f472b6",icon:"🌱",types:["국내ETF","펀드"]},
];
const AUTO_TYPES=["국내ETF","미국주식","미국ETF"];
const TYPE_COLORS={"국내ETF":"#f59e0b","미국주식":"#60a5fa","미국ETF":"#a78bfa","펀드":"#34d399","적금":"#fb923c"};
const DEFAULT_FX=1360;
const SK="pf_v4";
const TABS=["dash","accounts","ai"];

/* ─── 유틸 ─── */
const toKRW=(n,cur,fx)=>cur==="USD"?n*(fx||DEFAULT_FX):n;
const won=n=>{const v=parseFloat(n);return(!isFinite(v)||isNaN(v))?"₩0":`₩${Math.round(v).toLocaleString("ko-KR")}`;};
const pf=n=>{const v=parseFloat(n);if(!isFinite(v)||isNaN(v))return"0.00%";return`${v>=0?"+":""}${v.toFixed(2)}%`;};
const usd=n=>{const v=parseFloat(n);return(!isFinite(v)||isNaN(v))?"$0":`$${v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;};
const nf=n=>(n==null||n===""||isNaN(Number(n)))?"—":Number(n).toLocaleString("ko-KR");
const ld=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const parseDate=s=>{if(!s)return null;const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const calcSavings=h=>{
  const p=parseFloat(h.principal)||0,r=parseFloat(h.rate)||0,s=parseDate(h.startDate);
  if(!p||!r||!s)return null;
  const days=Math.max(0,Math.floor((new Date()-s)/86400000));
  const cur=p*(1+(r/100)*(days/365));
  return{principal:p,current:cur,pnl:cur-p,pct:(cur-p)/p*100,days};
};
const calcFund=h=>{
  const nav=parseFloat(h.nav)||0,qty=parseFloat(h.qty)||0,avgNav=parseFloat(h.avgNav)||0;
  if(!nav||!qty)return null;
  const cur=nav*qty,inv=avgNav>0?avgNav*qty:cur;
  return{current:cur,invested:inv,pnl:cur-inv,pct:inv>0?(cur-inv)/inv*100:0};
};

/* ─── 색상 ─── */
const C={
  bg:"#070e1c",card:"#0e1c2e",card2:"#111f33",border:"#1e3250",
  text:"#f0f4f8",sub:"#90b0cc",muted:"#527a96",
  up:"#e03131",upBg:"#e0313120",
  dn:"#1971c2",dnBg:"#1971c220",
  accent:"#60a5fa",green:"#34d399",
};

/* ─── 공통 컴포넌트 ─── */
function ProfitBadge({pct:p,pnl,size="md"}){
  const v=parseFloat(p)||0,isUp=v>0,isZero=Math.abs(v)<0.001;
  const col=isZero?C.muted:isUp?C.up:C.dn;
  const fs=size==="lg"?14:size==="sm"?11:12;
  const ok=pnl!==undefined&&!isNaN(parseFloat(pnl));
  return(<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:fs,fontWeight:700,color:col,background:isZero?"#52709620":isUp?C.upBg:C.dnBg,padding:"3px 10px",borderRadius:20,whiteSpace:"nowrap"}}>
    {isZero?"—":isUp?"▲":"▼"} {pf(Math.abs(v))}
    {ok&&<span style={{opacity:.9}}>· {isUp?"+":""}{won(pnl)}</span>}
  </span>);
}
function MiniBar({pct:p}){
  const v=parseFloat(p)||0,w=Math.min(Math.abs(v),100);
  return(<div style={{height:4,background:"#1e3250",borderRadius:2,overflow:"hidden",marginTop:8}}>
    <div style={{height:"100%",width:`${w}%`,background:v>0?C.up:v<0?C.dn:C.muted,borderRadius:2,transition:"width .5s"}}/>
  </div>);
}
function Lbl({t}){return<div style={{fontSize:13,color:C.sub,fontWeight:700,marginBottom:7}}>{t}</div>;}
function ST({t}){return<div style={{fontSize:12,color:C.sub,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>{t}</div>;}
function Toast({msg,type}){
  if(!msg)return null;
  return(<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:600,background:type==="error"?"#2a0f0f":"#0a2a1a",border:`1px solid ${type==="error"?C.up:C.green}`,borderRadius:12,padding:"12px 20px",color:C.text,fontSize:14,fontWeight:700,maxWidth:340,textAlign:"center",boxShadow:"0 4px 24px #00000070",animation:"fadeIn .2s ease",whiteSpace:"nowrap"}}>{type==="error"?"❌ ":"✅ "}{msg}</div>);
}

/* DonutChart */
function DonutChart({holdings,calcH,prices,fxRate}){
  const pd=useMemo(()=>{
    const m={};
    Object.entries(holdings).forEach(([aid,list])=>{
      const ac=ACCOUNTS.find(a=>a.id===aid),r=ac?.shared?0.5:1;
      (list||[]).forEach(h=>{const c=calcH(h,aid,prices,fxRate);if(c.current>0)m[h.assetType]=(m[h.assetType]||0)+c.current*r;});
    });
    return Object.entries(m).filter(([,v])=>v>0).map(([k,v])=>({label:k,color:TYPE_COLORS[k]||"#888",v})).sort((a,b)=>b.v-a.v);
  },[holdings,calcH,prices,fxRate]);
  const total=pd.reduce((s,d)=>s+d.v,0);
  if(!total)return(<div style={{background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`,textAlign:"center",color:C.muted,marginTop:14}}><div style={{fontSize:36,marginBottom:8}}>📊</div><div style={{fontSize:14,color:C.sub}}>계좌별 탭에서 종목을 추가하면<br/>자산 배분 차트가 나타나요</div></div>);
  const sz=154,cx=sz/2,cy=sz/2,R=sz*.41,r=sz*.265;let a=-Math.PI/2;
  const sl=pd.map(d=>{const da=(d.v/total)*2*Math.PI,ea=a+da,lg=da>Math.PI?1:0;const p=`M${cx+R*Math.cos(a)},${cy+R*Math.sin(a)}A${R},${R},0,${lg},1,${cx+R*Math.cos(ea)},${cy+R*Math.sin(ea)}L${cx+r*Math.cos(ea)},${cy+r*Math.sin(ea)}A${r},${r},0,${lg},0,${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}Z`;const s={p,color:d.color};a=ea;return s;});
  return(<div style={{background:C.card,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginTop:14}}>
    <ST t="자산유형 배분 (내 지분 기준)"/>
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      <svg width={sz} height={sz} style={{flexShrink:0}}>

/* ★ ModalInput - scrollIntoView로 키보드 올라올때 포커스 유지 */
const ModalInput=memo(function ModalInput({style,value,onChange,...rest}){
  const ref=useRef(null);
  const handleFocus=useCallback(()=>{
    setTimeout(()=>{if(ref.current)ref.current.scrollIntoView({behavior:"smooth",block:"center"});},300);
  },[]);
  return(<input ref={ref} value={value} onChange={onChange} onFocus={handleFocus} style={style} {...rest}/>);
});
const ModalSelect=memo(function ModalSelect({style,value,onChange,children}){
  return(<select value={value} onChange={onChange} style={style}>{children}</select>);
});

  useEffect(()=>{fxRateRef.current=fxRate;},[fxRate]);
  const fileRef=useRef(null);

  /* ★ 스와이프 핸들러 */
  const touchStartX=useRef(0);
  const touchStartY=useRef(0);
  const handleTouchStart=useCallback((e)=>{
    touchStartX.current=e.touches[0].clientX;
    touchStartY.current=e.touches[0].clientY;
  },[]);
  const handleTouchEnd=useCallback((e)=>{
    const dx=touchStartX.current-e.changedTouches[0].clientX;
    const dy=touchStartY.current-e.changedTouches[0].clientY;
    // 수평 스와이프가 수직보다 클때만 처리 (스크롤 충돌 방지)
    if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy)*1.5)return;
    const idx=TABS.indexOf(tab);
    if(dx>0&&idx<TABS.length-1)setTab(TABS[idx+1]); // 왼쪽 스와이프 → 다음탭
    else if(dx<0&&idx>0)setTab(TABS[idx-1]);         // 오른쪽 스와이프 → 이전탭
  },[tab]);

  useEffect(()=>{sv(SK,{holdings,fxRate});},[holdings,fxRate]);
  useEffect(()=>{if(!toast)return;const t=setTimeout(()=>setToast(null),2800);return()=>clearTimeout(t);},[toast]);
  const showToast=useCallback((msg,type="success")=>setToast({msg,type}),[]);

  /* ★ 환율 조회 - 새 환율값을 return해서 즉시 미국주식 계산에 반영 */
  const fetchFxRate=useCallback(async()=>{
    // 방법1: Yahoo Finance USDKRW=X (주식시세와 동일 방식)
    try{
      const url="https://query1.finance.yahoo.com/v8/finance/chart/USDKRW%3DX?interval=1d&range=1d";
      const proxyUrl=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const res=await fetch(proxyUrl);
      if(!res.ok)throw new Error("HTTP "+res.status);
      const j=await res.json();
      const contents=j?.contents;
      if(!contents)throw new Error("no contents");
      const meta=JSON.parse(contents)?.chart?.result?.[0]?.meta;
      const krw=meta?.regularMarketPrice;
      if(krw&&krw>500&&krw<5000){
        const rounded=Math.round(krw);
        setFxRate(rounded);
        fxRateRef.current=rounded;
        setFxAuto(true);
        setFxTime(new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
        return rounded;
      }
    }catch{}
    // 방법2: 백업 API
    try{
      const proxyUrl2=`https://api.allorigins.win/get?url=${encodeURIComponent("https://api.exchangerate.host/live?access_key=free&currencies=KRW&source=USD")}`;
      const res2=await fetch(proxyUrl2);
      const j2=await res2.json();
      const data=JSON.parse(j2?.contents||"{}");
      const krw2=data?.quotes?.USDKRW;
      if(krw2&&krw2>500&&krw2<5000){
        const rounded2=Math.round(krw2);
        setFxRate(rounded2);
        fxRateRef.current=rounded2;
        setFxAuto(true);
        setFxTime(new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
        return rounded2;
      }
    }catch{}
    return null; // 조회 실패
  },[]);

  /* ★ 시세 조회 (ETF/주식) + 환율 동시 실행 */
  const fetchPrices=useCallback(async(hMap)=>{
    setFetching(true);
    const tickers=new Set();
    Object.entries(hMap).forEach(([aid,list])=>{
      const ac=ACCOUNTS.find(a=>a.id===aid);
      if(ac?.directInput)return;
      (list||[]).forEach(h=>{
        if(!h.ticker||!AUTO_TYPES.includes(h.assetType))return;
        tickers.add(h.assetType==="국내ETF"?h.ticker+".KS":h.ticker);
      });
    });

    // ★ 환율 먼저 조회 → 새 환율값으로 주식시세 계산에 즉시 반영
    const newFx = await fetchFxRate(); // 새 환율 (실패시 null)

    // 주식 시세 조회
    const newP={};
    if(tickers.size>0){
      await Promise.allSettled([...tickers].map(async tk=>{
        try{
          const url=`https://query1.finance.yahoo.com/v8/finance/chart/${tk}?interval=1d&range=1d`;
          const res=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
          const j=await res.json();
          const meta=JSON.parse(j.contents)?.chart?.result?.[0]?.meta;
          if(meta?.regularMarketPrice){
            newP[tk]={price:meta.regularMarketPrice,prev:meta.chartPreviousClose||meta.regularMarketPrice,currency:meta.currency||"KRW",time:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})};
          }
        }catch{}
      }));
    }

    if(Object.keys(newP).length>0){
      setPrices(prev=>({...prev,...newP}));
    }
    // ★ 환율 갱신 성공시 토스트로 알림
    if(newFx){
      // fxRate state는 이미 fetchFxRate 내부에서 setFxRate로 업데이트됨
      // React state 업데이트는 비동기이므로 calcH는 다음 렌더에서 새 환율 반영
    }
    setLastUp(new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
    setCountdown(600);setFetching(false);
  },[fetchFxRate]);

  // eslint-disable-next-line
  useEffect(()=>{
    fetchFxRate();                    // ★ 앱 시작시 환율 즉시 조회
    fetchPrices(holdingsRef.current); // 시세 조회
  },[]);
  useEffect(()=>{
    const t=setInterval(()=>setCountdown(c=>{if(c<=1){fetchPrices(holdingsRef.current);return 600;}return c-1;}),1000);
    return()=>clearInterval(t);
  },[fetchPrices]);

  /* 수익 계산 */
  const calcH=useCallback((h,aid,snap,fx)=>{
    const ac=ACCOUNTS.find(a=>a.id===aid),pr=snap||prices,rate=fx||fxRateRef.current||fxRate;
    if(ac?.directInput){const inv=parseFloat(h.principal)||0,cur=parseFloat(h.evalAmount)||0,pnl=cur-inv,p=inv>0?pnl/inv*100:0;return{...h,invested:inv,current:cur,pnl,pct:p,pInfo:null,dayChg:null,calcMode:"direct"};}
    if(h.assetType==="적금"&&h.startDate&&h.rate){const s=calcSavings(h);if(s)return{...h,...s,pInfo:null,dayChg:null,calcMode:"savings"};}
    if(h.assetType==="펀드"&&h.nav&&h.qty){const f=calcFund(h);if(f)return{...h,...f,pInfo:null,dayChg:null,calcMode:"fund"};}
    const pk=h.ticker?(h.assetType==="국내ETF"?h.ticker+".KS":h.ticker):"";
    const pInfo=pk?pr[pk]:null;
    const cur=pInfo?pInfo.price:(parseFloat(h.currentPrice)||parseFloat(h.avgPrice)||0);
    const avg=parseFloat(h.avgPrice)||0,qty=parseFloat(h.qty)||0;
    if(qty<=0)return{...h,qty:0,avg,cur,invested:0,current:0,pnl:0,pct:0,pInfo,dayChg:null,calcMode:"manual"};
    const ck=toKRW(cur,h.currency||"KRW",rate),ak=toKRW(avg,h.currency||"KRW",rate);
    const inv=ak*qty,curr=ck*qty,pnl=curr-inv,p=inv>0?pnl/inv*100:0;
    const dayChg=pInfo?(pInfo.price-pInfo.prev)/pInfo.prev*100:null;
    const isAuto=AUTO_TYPES.includes(h.assetType)&&!!h.ticker;
    return{...h,qty,avg,cur,curKRW:ck,avgKRW:ak,invested:inv,current:curr,pnl,pct:p,pInfo,dayChg,isAuto,calcMode:isAuto?"auto":"manual"};
  },[prices,fxRate]);

  const calcAcct=useCallback((aid)=>{
    const list=(holdings[aid]||[]).map(h=>calcH(h,aid,prices,fxRate));
    const inv=list.reduce((s,h)=>s+(h.invested||0),0),cur=list.reduce((s,h)=>s+(h.current||0),0);
    return{list,invested:inv,current:cur,pnl:cur-inv,pct:inv>0?(cur-inv)/inv*100:0};
  },[holdings,prices,fxRate,calcH]);

  const allAccounts=useMemo(()=>ACCOUNTS.map(ac=>({...ac,...calcAcct(ac.id)})),[calcAcct]);

  /* ★ 내 총자산 (AMT 1/2 + 나머지) */
  const myTotal=useMemo(()=>allAccounts.reduce((s,ac)=>{
    const r=ac.shared?0.5:1;
    return{invested:s.invested+ac.invested*r,current:s.current+ac.current*r};
  },{invested:0,current:0}),[allAccounts]);
  const myPnl=myTotal.current-myTotal.invested;
  const myPct=myTotal.invested>0?myPnl/myTotal.invested*100:0;

  const curAcct=useMemo(()=>ACCOUNTS.find(a=>a.id===acctTab),[acctTab]);
  const curData=useMemo(()=>calcAcct(acctTab),[calcAcct,acctTab]);
  const mAcct=useMemo(()=>ACCOUNTS.find(a=>a.id===(form._acctId||acctTab)),[form._acctId,acctTab]);

  /* CRUD */
  const openAdd=useCallback(()=>{
    const ac=ACCOUNTS.find(a=>a.id===acctTab);
    const dt=ac.types.every(t=>t.includes("미국"))?"미국주식":ac.types[0];
    setForm({_acctId:acctTab,assetType:dt,currency:dt.includes("미국")?"USD":"KRW"});
    setEditIdx(null);setModal("holding");
  },[acctTab]);
  const openEdit=useCallback((aid,idx)=>{setForm({...holdings[aid][idx],_acctId:aid});setEditIdx(idx);setModal("holding");},[holdings]);
  const saveHolding=useCallback(()=>{
    if(!form.name?.trim()){showToast("종목명을 입력해주세요.","error");return;}
    const aid=form._acctId,ac=ACCOUNTS.find(a=>a.id===aid);
    let entry;
    if(ac?.directInput){entry={name:form.name.trim(),assetType:form.assetType||ac.types[0],principal:form.principal||"0",evalAmount:form.evalAmount||"0",memo:form.memo||""};}
    else if(form.assetType==="적금"){if(!form.startDate){showToast("가입일을 입력해주세요.","error");return;}entry={name:form.name.trim(),assetType:"적금",principal:form.principal||"0",rate:form.rate||"0",startDate:form.startDate,memo:form.memo||""};}
    else if(form.assetType==="펀드"){entry={name:form.name.trim(),assetType:"펀드",nav:form.nav||"0",qty:form.qty||"0",avgNav:form.avgNav||"0",memo:form.memo||""};}
    else{entry={name:form.name.trim(),ticker:(form.ticker||"").toUpperCase().trim(),assetType:form.assetType||ac.types[0],currency:form.currency||"KRW",qty:form.qty||"0",avgPrice:form.avgPrice||"0",currentPrice:form.currentPrice||"",memo:form.memo||""};}
    const list=[...(holdings[aid]||[])];
    if(editIdx!==null)list[editIdx]=entry;else list.push(entry);
    const next={...holdings,[aid]:list};
    setHoldings(next);holdingsRef.current=next;
    if(!ac?.directInput&&entry.assetType!=="적금"&&entry.assetType!=="펀드")fetchPrices(next);
    setModal(null);setForm({});setEditIdx(null);
    showToast(editIdx!==null?"수정 완료!":"종목 추가 완료!");
  },[form,editIdx,holdings,fetchPrices,showToast]);
  const confirmDelete=useCallback((aid,idx,name)=>{
    setConfirmCb({fn:()=>{setHoldings(prev=>{const next={...prev,[aid]:(prev[aid]||[]).filter((_,i)=>i!==idx)};holdingsRef.current=next;return next;});setModal(null);setConfirmCb(null);showToast(`${name} 삭제 완료`);}});
    setModal("confirm");
  },[showToast]);

  /* 백업/복원 */
  const exportData=useCallback(()=>{
    const blob=new Blob([JSON.stringify({holdings,fxRate,exportedAt:new Date().toISOString(),version:"v4"},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url;a.download=`portfolio_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1500);showToast("백업 파일 저장 완료!");
  },[holdings,fxRate,showToast]);
  const importData=useCallback((e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);if(d.holdings){setHoldings(d.holdings);holdingsRef.current=d.holdings;}if(d.fxRate)setFxRate(d.fxRate);showToast(d.holdings?"복원 완료!":"올바른 백업 파일이 아닙니다.",d.holdings?"success":"error");}catch{showToast("파일 오류. JSON 파일을 확인해주세요.","error");}};
    reader.readAsText(file);if(fileRef.current)fileRef.current.value="";
  },[showToast]);

  /* AI */
  const askAI=useCallback(async()=>{
    if(!aiQ.trim()||aiLoad)return;
    const q=aiQ;setAiLoad(true);setAiA("");setAiQ("");
    const lines=allAccounts.map(ac=>{const r=ac.shared?0.5:1;return`[${ac.label}${ac.shared?" (공동1/2)":""}] 투자금 ${won(ac.invested*r)}, 현재 ${won(ac.current*r)}, 수익률 ${pf(ac.pct)}`;}).join("\n");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"당신은 한국어 투자 포트폴리오 분석 어시스턴트입니다. 간결하고 실용적으로 답하세요. 투자 결정의 책임은 본인에게 있음을 항상 명시하세요.",
          messages:[{role:"user",content:`포트폴리오:\n${lines}\n내 총수익: ${won(myPnl)} (${pf(myPct)})\n\n질문: ${q}`}]})});
      const d=await res.json();setAiA(d.content?.[0]?.text||"응답을 받지 못했어요.");
    }catch{setAiA("네트워크 오류. 다시 시도해주세요.");}
    setAiLoad(false);
  },[aiQ,aiLoad,allAccounts,myPnl,myPct]);

  /* ★ 카드 상세 - 미국주식/ETF는 달러+원화 동시 표시 */
  const cardDet=(h,ac)=>{
    if(ac.directInput)return[["투자원금",won(h.invested)],["평가금액",won(h.current)],["수익금",`${h.pnl>=0?"+":""}${won(h.pnl)}`]];
    if(h.calcMode==="savings")return[["원금",won(h.principal)],["경과",`${h.days||0}일`],["이자",`+${won(h.pnl)}`]];
    if(h.calcMode==="fund")return[["보유좌수",nf(h.qty)],["기준가",`${nf(parseFloat(h.nav||0).toFixed(2))}원`],["수익금",`${h.pnl>=0?"+":""}${won(h.pnl)}`]];
    // ★ 미국주식/ETF: 달러+원화 동시
    if(h.currency==="USD"){
      return[
        ["평균단가",`${usd(h.avg)}\n${won(h.avgKRW)}`],
        ["현재가",`${usd(h.cur)}\n${won(h.curKRW)}`],
        ["수익금",`${h.pnl>=0?"+":""}${won(h.pnl)}`]
      ];
    }
    return[["평균단가",won(h.avg)],["현재가",won(h.cur)],["수익금",`${h.pnl>=0?"+":""}${won(h.pnl)}`]];
  };

  const mins=Math.floor(countdown/60),secs=(countdown%60).toString().padStart(2,"0");

  /* ── 렌더 ── */
  return(
    <div
      style={{minHeight:"100vh",background:C.bg,color:C.text,paddingBottom:80}}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
    >
      <Toast msg={toast?.msg} type={toast?.type}/>

      {/* ★ 헤더 */}
      <div style={{padding:"48px 18px 18px",background:"linear-gradient(180deg,#0c2040,#070e1c)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:4,textTransform:"uppercase",marginBottom:6}}>MY PORTFOLIO</div>
        <div style={{fontSize:34,fontWeight:800,color:"#fff",letterSpacing:-1.5,lineHeight:1.1}}>{won(myTotal.current)}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:C.sub}}>내 투자원금 {won(myTotal.invested)}</span>
          <ProfitBadge pct={myPct} pnl={myPnl} size="lg"/>
        </div>

        {/* ★ KPI 카드 3개 (총투자원금 / 총수익률 / 총수익금액) */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
          {[
            {label:"총 투자원금",value:won(myTotal.invested),color:C.sub},
            {label:"총 수익률",value:pf(myPct),color:myPct>=0?C.up:C.dn},
            {label:"총 수익금액",value:`${myPnl>=0?"+":""}${won(myPnl)}`,color:myPnl>=0?C.up:C.dn},
          ].map((k,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"10px 10px",border:"1px solid rgba(255,255,255,0.08)",textAlign:"center"}}>
              <div style={{fontSize:9,color:C.muted,marginBottom:5,letterSpacing:.3}}>{k.label}</div>
              <div style={{fontSize:12,fontWeight:800,color:k.color,lineHeight:1.2}}>{k.value}</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:10,color:C.muted,marginTop:6}}>※ AMT 계좌 수익 1/2만 내 몫 · $1=₩{fxRate}{fxTime?` (환율 ${fxTime})`:""}</div>

        {/* 자동갱신 바 */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}>
          <div style={{flex:1,height:3,background:C.border,borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",background:C.accent,width:`${(countdown/600)*100}%`,transition:"width 1s linear",borderRadius:2}}/>
          </div>
          <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{fetching?"⏳ 갱신중...":`🔄 ${mins}:${secs}`}</span>
          <button onClick={()=>fetchPrices(holdingsRef.current)} style={{minHeight:36,padding:"0 12px",background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:C.accent,fontSize:12}}>지금</button>
        </div>
        {lastUp&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>시세: {lastUp} · ETF·주식·환율 자동 / 펀드 기준가 / 적금 자동계산</div>}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={exportData} style={{flex:1,minHeight:44,background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,color:"#a78bfa",fontSize:13,fontWeight:700}}>💾 백업</button>
          <label style={{flex:1,minHeight:44,display:"flex",alignItems:"center",justifyContent:"center",background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,color:C.green,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            📂 복원<input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
          </label>
          <button onClick={()=>setModal("settings")} style={{minHeight:44,padding:"0 14px",background:C.card2,border:`1px solid ${C.border}`,borderRadius:12,color:C.sub,fontSize:18}}>⚙️</button>
        </div>
      </div>

      {/* 탭 */}
      <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        {[["dash","📊","대시보드"],["accounts","💼","계좌별"],["ai","🤖","AI분석"]].map(([k,e,v])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,minHeight:58,padding:"8px 0 10px",fontSize:11,fontWeight:700,background:"none",border:"none",color:tab===k?C.accent:C.muted,borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:21}}>{e}</span>{v}
          </button>
        ))}
      </div>

      {/* 대시보드 */}
      {tab==="dash"&&(
        <div style={{padding:"16px 16px 8px"}}>
          <ST t="계좌별 현황"/>
          {allAccounts.map(ac=>{
            const r=ac.shared?0.5:1,myCur=ac.current*r,myInv=ac.invested*r,myP=myCur-myInv;
            return(<div key={ac.id} onClick={()=>{setTab("accounts");setAcctTab(ac.id);}} style={{background:C.card,borderRadius:14,padding:"14px 16px",border:`1px solid ${C.border}`,borderLeft:`4px solid ${ac.color}`,marginBottom:8,minHeight:70,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,marginRight:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:16}}>{ac.icon}</span>
                    <span style={{fontSize:15,fontWeight:700,color:C.text}}>{ac.label}</span>
                    {ac.shared&&<span style={{fontSize:10,color:"#f59e0b",background:"#f59e0b1a",padding:"2px 7px",borderRadius:10}}>공동 1/2</span>}
                    {ac.directInput&&<span style={{fontSize:10,color:"#a78bfa",background:"#a78bfa1a",padding:"2px 7px",borderRadius:10}}>직접입력</span>}
                  </div>
                  <div style={{fontSize:12,color:C.muted,marginTop:3}}>{(ac.list||[]).length}종목 · 투자금 {won(myInv)}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:15,fontWeight:800,color:C.text}}>{won(myCur)}</div>
                  <ProfitBadge pct={ac.pct} pnl={myP} size="sm"/>
                </div>
              </div>
              <MiniBar pct={ac.pct}/>
            </div>);
          })}
          <DonutChart holdings={holdings} calcH={calcH} prices={prices} fxRate={fxRate}/>
        </div>
      )}

      {/* 계좌별 */}
      {tab==="accounts"&&(
        <div>
          <div style={{display:"flex",overflowX:"auto",gap:8,padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
            {ACCOUNTS.map(ac=>(<button key={ac.id} onClick={()=>setAcctTab(ac.id)} style={{flexShrink:0,minHeight:40,padding:"0 16px",borderRadius:20,fontSize:13,fontWeight:700,whiteSpace:"nowrap",border:`1px solid ${acctTab===ac.id?ac.color:C.border}`,background:acctTab===ac.id?ac.color+"22":"transparent",color:acctTab===ac.id?ac.color:C.muted}}>
              {ac.icon} {ac.short}
            </button>))}
          </div>
          <div style={{padding:16}}>
            <div style={{background:C.card,borderRadius:16,padding:18,border:`1px solid ${C.border}`,borderTop:`3px solid ${curAcct.color}`,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,marginRight:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                    <span style={{fontSize:18,fontWeight:800,color:C.text}}>{curAcct.icon} {curAcct.label}</span>
                    {curAcct.shared&&<span style={{fontSize:11,color:"#f59e0b",background:"#f59e0b1a",padding:"2px 8px",borderRadius:10}}>🤝 공동계좌</span>}
                    {curAcct.directInput&&<span style={{fontSize:11,color:"#a78bfa",background:"#a78bfa1a",padding:"2px 8px",borderRadius:10}}>📱 직접입력</span>}
                  </div>
                  {curAcct.directInput&&<div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>신한앱 원금+평가금액 입력 → 수익률 자동계산</div>}
                  {curAcct.shared&&<div style={{fontSize:12,color:"#f59e0b",marginTop:2}}>수익의 1/2이 내 몫으로 집계</div>}
                  <div style={{fontSize:12,color:C.muted,marginTop:4}}>투자원금 {won(curData.invested)}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:20,fontWeight:800,color:C.text}}>{won(curData.current)}</div>
                  <ProfitBadge pct={curData.pct} pnl={curData.pnl}/>
                </div>
              </div>
              <MiniBar pct={curData.pct}/>
            </div>
            {!curAcct.directInput&&(<div style={{background:C.card2,borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`,marginBottom:12,fontSize:12,color:C.sub,lineHeight:1.7}}>
              🔄 <b style={{color:C.text}}>ETF·주식</b>: 티커 입력 → 자동시세 (10~20분지연)<br/>
              📊 <b style={{color:C.text}}>펀드</b>: 기준가 입력 → 평가금액 자동계산<br/>
              💰 <b style={{color:C.text}}>적금</b>: 원금+금리+가입일 → 이자 매일 자동계산
            </div>)}
            {curData.list.length===0&&(<div style={{textAlign:"center",padding:"44px 0",color:C.muted}}>
              <div style={{fontSize:44,marginBottom:12}}>📭</div>
              <div style={{fontSize:14,color:C.sub,lineHeight:1.8}}>{curAcct.directInput?"신한앱에서 원금·평가금액 확인 후\n아래 버튼으로 추가하세요":"아래 버튼으로 종목을 추가하세요"}</div>
            </div>)}
            {curData.list.map((h,i)=>{
              const det=cardDet(h,curAcct);
              return(<div key={i} style={{background:C.card,borderRadius:14,padding:16,border:`1px solid ${C.border}`,borderLeft:`3px solid ${curAcct.color}`,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div style={{flex:1,marginRight:10}}>
                    <div style={{fontSize:15,fontWeight:800,color:C.text,lineHeight:1.4}}>{h.name}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:4,display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{background:"#1e3250",padding:"2px 8px",borderRadius:5}}>{h.assetType}</span>
                      {!curAcct.directInput&&h.ticker&&<span style={{background:"#1e3250",padding:"2px 8px",borderRadius:5}}>{h.ticker}</span>}
                      {h.calcMode==="auto"&&h.pInfo&&<span style={{color:C.green,fontWeight:600}}>● 자동 {h.pInfo.time}</span>}
                      {h.calcMode==="savings"&&<span style={{color:"#fb923c",fontWeight:600}}>💰 이자 자동계산</span>}
                      {h.calcMode==="fund"&&<span style={{color:C.green,fontWeight:600}}>📊 기준가 방식</span>}
                      {h.calcMode==="manual"&&!curAcct.directInput&&!h.ticker&&<span style={{color:"#f59e0b"}}>✏️ 수동</span>}
                      {h.dayChg!==null&&<span style={{color:h.dayChg>=0?C.up:C.dn}}>당일 {h.dayChg>=0?"+":""}{h.dayChg?.toFixed(2)}%</span>}
                      {/* ★ 미국주식/ETF 환율 표시 */}
                      {h.currency==="USD"&&<span style={{color:"#60a5fa",fontWeight:600}}>$1=₩{fxRate}</span>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    {/* ★ 미국주식/ETF: 달러+원화 동시 표시 */}
                    {h.currency==="USD"?(<>
                      <div style={{fontSize:13,fontWeight:700,color:C.sub}}>{usd(h.cur)}</div>
                      <div style={{fontSize:15,fontWeight:800,color:C.text}}>{won(h.current)}</div>
                    </>):(
                      <div style={{fontSize:15,fontWeight:800,color:C.text}}>{won(h.current)}</div>
                    )}
                    <ProfitBadge pct={h.pct} size="sm"/>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"12px 0",borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,marginBottom:12}}>
                  {det.map(([l,v],j)=>(
                    <div key={j} style={{textAlign:"center"}}>
                      <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div>
                      {/* ★ 줄바꿈 처리 (달러\n원화) */}
                      {v.includes("\n")?(<>
                        {v.split("\n").map((line,li)=><div key={li} style={{fontSize:li===0?11:12,fontWeight:li===0?400:700,color:li===0?C.muted:C.text}}>{line}</div>)}
                      </>):(
                        <div style={{fontSize:12,fontWeight:700,color:(l==="수익금"||l==="이자")?(h.pnl>=0?C.up:C.dn):C.text}}>{v}</div>
                      )}
                    </div>
                  ))}
                </div>
                <MiniBar pct={h.pct}/>
                {curAcct.directInput&&<div style={{marginTop:10,padding:"10px 12px",background:C.card2,borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,color:C.sub}}>💡 추가매수 후: 수정 → 원금·평가금액만 업데이트</div>}
                {h.memo&&<div style={{fontSize:12,color:C.muted,marginTop:8,fontStyle:"italic"}}>📝 {h.memo}</div>}
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>openEdit(acctTab,i)} style={{flex:1,minHeight:46,fontSize:13,fontWeight:700,background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,color:C.accent}}>✏️ 수정</button>
                  <button onClick={()=>confirmDelete(acctTab,i,h.name)} style={{flex:1,minHeight:46,fontSize:13,fontWeight:700,background:"#1a0e0e",border:`1px solid ${C.up}44`,borderRadius:10,color:C.up}}>🗑 삭제</button>
                </div>
              </div>);
            })}
            <button onClick={openAdd} style={{width:"100%",minHeight:52,fontSize:15,fontWeight:700,background:`${curAcct.color}20`,border:`1px solid ${curAcct.color}60`,borderRadius:14,color:curAcct.color,marginTop:4}}>
              ➕ {curAcct.label} 종목 추가
            </button>
          </div>
        </div>
      )}

      {/* AI */}
      {tab==="ai"&&(
        <div style={{padding:16}}>
          <div style={{background:"linear-gradient(135deg,#0d1f35,#0d1a2a)",borderRadius:16,padding:18,border:`1px solid #1a3050`,marginBottom:16}}>
            <div style={{fontSize:14,color:C.sub,fontWeight:700,marginBottom:6}}>🤖 AI 포트폴리오 분석</div>
            <div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>6개 계좌 전체 데이터를 기반으로 Claude AI에게 분석을 요청하세요.</div>
          </div>
          <ST t="빠른 질문"/>
          {["전체 포트폴리오 수익률 분석해줘","퇴직연금·IRP·ISA 절세 전략 알려줘","계좌별 자산 재배분 추천해줘","AMT 공동계좌 수익 분배 정리해줘","리스크 높은 자산 알려줘"].map((q,i)=>(
            <button key={i} onClick={()=>setAiQ(q)} style={{width:"100%",minHeight:48,padding:"0 16px",marginBottom:7,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,color:C.sub,fontSize:13,textAlign:"left"}}>💬 {q}</button>
          ))}
          <div style={{display:"flex",gap:8,marginTop:4,marginBottom:14}}>
            <input value={aiQ} onChange={e=>setAiQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();askAI();}}} placeholder="직접 질문을 입력하세요..."
              style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,padding:"13px 14px",fontSize:16,outline:"none"}}/>
            <button onClick={askAI} disabled={aiLoad} style={{minWidth:64,minHeight:50,padding:"0 14px",border:"none",borderRadius:10,background:aiLoad?"#162236":"linear-gradient(135deg,#3b82f6,#1d4ed8)",color:"#fff",fontSize:14,fontWeight:700}}>{aiLoad?"⏳":"전송"}</button>
          </div>
          {aiLoad&&<div style={{background:C.card,borderRadius:14,padding:24,border:`1px solid ${C.border}`,textAlign:"center",color:C.sub,fontSize:14}}>🤖 분석 중...</div>}
          {aiA&&!aiLoad&&(<div style={{background:"linear-gradient(135deg,#0d1f35,#0d1a2a)",borderRadius:14,padding:18,border:`1px solid #1a3050`}}>
            <div style={{fontSize:13,color:C.accent,marginBottom:10,fontWeight:700}}>🤖 Claude AI 분석 결과</div>
            <div style={{fontSize:14,color:C.text,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{aiA}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`}}>⚠️ AI 분석은 참고용이며 투자 결정의 책임은 본인에게 있습니다.</div>
          </div>)}
        </div>
      )}

      {/* 하단 네비 + 스와이프 인디케이터 */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(7,14,28,0.97)",backdropFilter:"blur(12px)",borderTop:`1px solid ${C.border}`,zIndex:20,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        <div style={{display:"flex"}}>
          {[["dash","📊","대시보드"],["accounts","💼","계좌별"],["ai","🤖","AI분석"]].map(([k,e,v])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,minHeight:58,padding:"8px 0 10px",fontSize:11,fontWeight:700,background:"none",border:"none",color:tab===k?C.accent:C.muted,borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:21}}>{e}</span>{v}
            </button>
          ))}
        </div>
        {/* ★ 스와이프 인디케이터 */}
        <div style={{display:"flex",justifyContent:"center",gap:5,paddingBottom:6}}>
          {TABS.map(t=><div key={t} style={{width:t===tab?20:6,height:3,borderRadius:3,background:t===tab?C.accent:C.muted,transition:"all .3s"}}/>)}
        </div>
      </div>

      {/* 모달들 */}
      <FormModal show={modal==="holding"} form={form} setForm={setForm} editIdx={editIdx} mAcct={mAcct} prices={prices} fxRate={fxRate} onSave={saveHolding} onClose={()=>setModal(null)}/>
      <SettingsModal show={modal==="settings"} fxRate={fxRate} fxAuto={fxAuto} fxTime={fxTime} setFxRate={setFxRate} onClose={()=>setModal(null)} showToast={showToast} onFetchFx={fetchFxRate}/>
      {modal==="confirm"&&confirmCb&&(<ConfirmModal msg="이 종목을 삭제할까요? 삭제 후 복구가 어렵습니다." onOk={confirmCb.fn} onCancel={()=>{setModal(null);setConfirmCb(null);}}/>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
