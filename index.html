<script>
var LOCK_KEY = "pf_lock_pw";
var DEFAULT_PW = "1234";
var bioCredId = localStorage.getItem("pf_bio_cred") || null;

function getSavedPw() { return localStorage.getItem(LOCK_KEY) || DEFAULT_PW; }

function unlock() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("root").style.display = "block";
}

function setMsg(msg, isErr) {
  var el = document.getElementById("lockMsg");
  el.textContent = msg;
  el.style.color = isErr ? "#e03131" : "#34d399";
}

function clearMsg() {
  var el = document.getElementById("lockMsg");
  el.textContent = "비밀번호 입력 또는 지문 인증";
  el.style.color = "#527a96";
}

function tryPassword() {
  var v = document.getElementById("pwInput").value;
  if (!v) { setMsg("비밀번호를 입력해주세요.", true); return; }
  if (v === getSavedPw()) {
    setMsg("인증 성공!", false);
    setTimeout(unlock, 350);
  } else {
    setMsg("비밀번호가 틀렸어요.", true);
    document.getElementById("pwInput").value = "";
    var inp = document.getElementById("pwInput");
    inp.style.borderColor = "#e03131";
    inp.style.animation = "shake .35s ease";
    setTimeout(function() {
      inp.style.borderColor = "#1e3250";
      inp.style.animation = "";
      inp.focus();
    }, 400);
  }
}

function togglePw() {
  var i = document.getElementById("pwInput");
  i.type = (i.type === "password") ? "text" : "password";
}

function tryBiometric() {
  document.getElementById("bioBtn").textContent = "⏳";
  if (bioCredId) { authBio(); } else { enrollBio(); }
}

function enrollBio() {
  if (!window.PublicKeyCredential) {
    setMsg("지문 미지원 기기입니다.", true);
    resetBioBtn();
    return;
  }
  setMsg("지문을 올려주세요...", false);
  var ch = new Uint8Array(32);
  crypto.getRandomValues(ch);
  navigator.credentials.create({
    publicKey: {
      challenge: ch,
      rp: { name: "내포트폴리오", id: location.hostname || "localhost" },
      user: { id: new Uint8Array([1]), name: "user", displayName: "사용자" },
      pubKeyCredParams: [
        { type: "public-key", alg: -7 },
        { type: "public-key", alg: -257 }
      ],
      authenticatorSelection: {
        authenticatorAttachment: "platform",
        userVerification: "required",
        requireResidentKey: false
      },
      timeout: 30000
    }
  }).then(function(cred) {
    var rawBytes = new Uint8Array(cred.rawId);
    var binary = "";
    for (var i = 0; i < rawBytes.length; i++) binary += String.fromCharCode(rawBytes[i]);
    var id = btoa(binary);
    localStorage.setItem("pf_bio_cred", id);
    bioCredId = id;
    document.getElementById("bioLabel").textContent = "지문 인식 (등록됨)";
    document.getElementById("bioBtn").style.borderColor = "#34d399";
    setMsg("지문 등록 완료!", false);
    setTimeout(unlock, 500);
  }).catch(function(e) {
    setMsg(e.name === "NotAllowedError" ? "지문 인식이 취소됐어요." : "지문 등록 실패. 기기 설정을 확인하세요.", true);
    resetBioBtn();
  });
}

function authBio() {
  if (!window.PublicKeyCredential) {
    setMsg("지문 미지원 기기입니다.", true);
    resetBioBtn();
    return;
  }
  setMsg("지문을 인식합니다...", false);
  var ch = new Uint8Array(32);
  crypto.getRandomValues(ch);
  var bin = atob(bioCredId);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  navigator.credentials.get({
    publicKey: {
      challenge: ch,
      allowCredentials: [{ type: "public-key", id: arr.buffer }],
      userVerification: "required",
      timeout: 30000
    }
  }).then(function() {
    setMsg("지문 인증 성공!", false);
    setTimeout(unlock, 350);
  }).catch(function(e) {
    if (e.name === "InvalidStateError") {
      localStorage.removeItem("pf_bio_cred");
      bioCredId = null;
      setMsg("지문 정보가 초기화됐어요. 다시 등록해주세요.", true);
    } else {
      setMsg(e.name === "NotAllowedError" ? "지문 인식이 취소됐어요." : "지문 인식 실패. 비밀번호를 사용해주세요.", true);
    }
    resetBioBtn();
  });
}

function resetBioBtn() { document.getElementById("bioBtn").textContent = "👆"; }

function showChangePw() {
  document.getElementById("changePwPanel").style.display = "block";
  setTimeout(function() { document.getElementById("oldPw").focus(); }, 100);
}

function cancelChangePw() {
  document.getElementById("changePwPanel").style.display = "none";
  var ids = ["oldPw", "newPw1", "newPw2"];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).value = "";
  clearMsg();
}

function doChangePw() {
  var old = document.getElementById("oldPw").value;
  var p1  = document.getElementById("newPw1").value;
  var p2  = document.getElementById("newPw2").value;
  if (!old) { setMsg("현재 비밀번호를 입력해주세요.", true); document.getElementById("oldPw").focus(); return; }
  if (old !== getSavedPw()) { setMsg("현재 비밀번호가 틀렸어요.", true); document.getElementById("oldPw").value = ""; document.getElementById("oldPw").focus(); return; }
  if (!p1 || p1.length < 4) { setMsg("새 비밀번호는 4자 이상이어야 해요.", true); document.getElementById("newPw1").focus(); return; }
  if (p1 !== p2) { setMsg("새 비밀번호가 일치하지 않아요.", true); document.getElementById("newPw2").value = ""; document.getElementById("newPw2").focus(); return; }
  if (p1 === old) { setMsg("현재 비밀번호와 같아요. 다른 비밀번호를 입력해주세요.", true); return; }
  localStorage.setItem(LOCK_KEY, p1);
  cancelChangePw();
  setMsg("비밀번호가 변경됐어요!", false);
}

// 초기화 (지문 지원 여부 확인)
function portfolioInit() {
  if (!localStorage.getItem(LOCK_KEY)) setMsg("초기 비밀번호: 1234 (변경을 권장해요)", false);
  if (!window.PublicKeyCredential) {
    document.getElementById("bioBtn").style.opacity = "0.35";
    document.getElementById("bioLabel").textContent = "지문 미지원";
    return;
  }
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
    .then(function(ok) {
      if (!ok) {
        document.getElementById("bioBtn").style.opacity = "0.35";
        document.getElementById("bioLabel").textContent = "지문 센서 없음";
      } else if (bioCredId) {
        document.getElementById("bioLabel").textContent = "지문 인식 (등록됨)";
        document.getElementById("bioBtn").style.borderColor = "#34d399";
        document.getElementById("bioBtn").style.boxShadow = "0 4px 24px #34d39933";
      }
    })
    .catch(function() {
      document.getElementById("bioBtn").style.opacity = "0.35";
      document.getElementById("bioLabel").textContent = "지문 미지원";
    });
}
portfolioInit();

// 캐시 복원
function getPricesCache() {
  try { return JSON.parse(localStorage.getItem("pf_prices_cache") || "{}"); }
  catch(e) { return {}; }
}
function getFxCache() {
  try { return JSON.parse(localStorage.getItem("pf_fx_cache") || "null"); }
  catch(e) { return null; }
}
window.__cache = { prices: getPricesCache(), fxCache: getFxCache() };
</script>


<script>
// Promise.any 폴리필 (구형 안드로이드 크롬 지원)
if(typeof Promise.any !== "function"){
  Promise.any = function(promises){
    return new Promise(function(resolve, reject){
      var errors = [];
      var remaining = promises.length;
      if(remaining === 0){ reject(new AggregateError([], "All promises were rejected")); return; }
      promises.forEach(function(p, i){
        Promise.resolve(p).then(resolve).catch(function(e){
          errors[i] = e;
          remaining--;
          if(remaining === 0) reject(new AggregateError(errors, "All promises were rejected"));
        });
      });
    });
  };
}
if(typeof AggregateError !== "function"){
  window.AggregateError = function(errors, message){ this.errors = errors; this.message = message; };
  window.AggregateError.prototype = Object.create(Error.prototype);
}
</script>

/* ─── 유틸 ─── */
const toKRW = (n, cur, fx) => cur === "USD" ? n * (fx || DEFAULT_FX) : n;
const won = n => {
  const v = parseFloat(n);
  if (!isFinite(v) || isNaN(v)) return "₩0";
  const abs = Math.abs(Math.round(v));
  return (v < 0 ? "-" : "") + "₩" + abs.toLocaleString("ko-KR");
};
const pf = n => {
  const v = parseFloat(n);
  if (!isFinite(v) || isNaN(v)) return "0.00%";
  return `${v > 0 ? "+" : v < 0 ? "-" : ""}${Math.abs(v).toFixed(2)}%`;
};
const usd = n => {
  const v = parseFloat(n);
  return !isFinite(v) || isNaN(v) ? "$0" : `$${v.toLocaleString("en-US", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  })}`;
};
const nf = n => n == null || n === "" || isNaN(Number(n)) ? "—" : Number(n).toLocaleString("ko-KR");
const ld = (k, d) => {
  try {
    return JSON.parse(localStorage.getItem(k)) ?? d;
  } catch (e) {
    return d;
  }
};
const sv = (k, v) => {
  try {
    localStorage.setItem(k, JSON.stringify(v));
  } catch (e) {}
};
const parseDate = s => {
  if (!s) return null;
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
};
const calcSavings = h => {
  const p = parseFloat(h.principal) || 0,
    r = parseFloat(h.rate) || 0,
    s = parseDate(h.startDate);
  if (!p || !r || !s) return null;
  const days = Math.max(0, Math.floor((new Date() - s) / 86400000));
  const cur = p * (1 + r / 100 * (days / 365));
  return {
    principal: p,
    current: cur,
    pnl: cur - p,
    pct: (cur - p) / p * 100,
    days
  };
};
const calcFund = h => {
