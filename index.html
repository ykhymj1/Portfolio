<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Portfolio Optimized Full</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{margin:0;background:#070e1c;color:#fff;font-family:sans-serif;}
#root{max-width:480px;margin:auto;padding:16px;}
.card{background:#0e1c2e;border:1px solid #1e3250;border-radius:12px;padding:16px;margin-bottom:12px;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const DEFAULT_FX = 1360;
let lastFetch = 0;

// ===== 실제 API 교체 가능 =====
async function fetchPrice(ticker){
  return {price: Math.random()*100 + 100};
}

function App(){

  const [prices,setPrices] = useState({});
  const [fx,setFx] = useState(DEFAULT_FX);
  const [loading,setLoading] = useState(false);

  const touchStart = useRef(0);
  const touchEnd = useRef(0);

  // ===== 1. 최초 로딩 최적화 =====
  useEffect(()=>{
    const cacheP = JSON.parse(localStorage.getItem("prices")||"{}");
    const cacheFx = JSON.parse(localStorage.getItem("fx")||"null");

    if(cacheP) setPrices(cacheP);
    if(cacheFx?.rate) setFx(cacheFx.rate);

    // 백그라운드 업데이트
    setTimeout(refreshAll, 50);
  },[]);

  // ===== 2. 실시간 가격 =====
  useEffect(()=>{
    const i = setInterval(()=>{
      if(Date.now() - lastFetch < 8000) return;
      lastFetch = Date.now();
      refreshPrices();
    },10000);
    return ()=>clearInterval(i);
  },[]);

  // ===== 3. 환율 =====
  useEffect(()=>{
    fetchFx();
    const i = setInterval(fetchFx,60000);
    return ()=>clearInterval(i);
  },[]);

  // ===== 가격 업데이트 =====
  const refreshPrices = async ()=>{
    const tickers = ["AAPL","TSLA","QQQ"];

    try{
      const results = await Promise.all(tickers.map(fetchPrice));
      const newP = {};

      results.forEach((r,i)=>{
        newP[tickers[i]] = r;
      });

      setPrices(prev=>({...prev,...newP}));
      localStorage.setItem("prices",JSON.stringify({...prices,...newP}));

    }catch(e){
      console.log("가격 오류",e);
    }
  };

  // ===== 환율 =====
  const fetchFx = async ()=>{
    try{
      const res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
      const data = await res.json();
      setFx(data.rates.KRW);

      localStorage.setItem("fx",JSON.stringify({
        rate:data.rates.KRW,
        time:Date.now()
      }));
    }catch(e){
      console.log("환율 오류");
    }
  };

  // ===== 전체 =====
  const refreshAll = async ()=>{
    setLoading(true);
    await Promise.all([refreshPrices(),fetchFx()]);
    setLoading(false);
  };

  // ===== Pull to refresh =====
  const onStart = e=>touchStart.current = e.touches[0].clientY;
  const onMove = e=>touchEnd.current = e.touches[0].clientY;
  const onEnd = ()=>{
    const diff = touchEnd.current - touchStart.current;
    if(diff > 90 && window.scrollY === 0){
      refreshAll();
    }
  };

  return(
    <div onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}>

      <div className="card">
        <h3>환율 (자동)</h3>
        <div>{fx.toFixed(2)}</div>
      </div>

      <div className="card">
        <h3>종목 (실시간)</h3>
        {Object.keys(prices).map(k=>(
          <div key={k}>{k} : {prices[k]?.price?.toFixed(2)}</div>
        ))}
      </div>

      <div className="card">
        <button onClick={refreshAll}>
          {loading ? "갱신 중..." : "수동 새로고침"}
        </button>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
